<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NutriFit - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="app.css" rel="stylesheet">
  <style>
    /* ===== LOGIN PAGE STYLES ===== */
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --text-primary: #1a1a2e;
      --text-secondary: #6c757d;
      --success: #28a745;
    }

    [data-theme="dark"] {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
    }

    html {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
    }

    [data-theme="dark"] body {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
    }

    .login-wrapper {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      background: var(--bg-primary);
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 3rem 2.5rem;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .login-header h1 i {
      color: var(--success);
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin: 0;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 0.75rem;
      display: block;
      font-size: 0.95rem;
    }

    .form-control {
      border-radius: 0.6rem;
      border: 1px solid #e0e6ed;
      padding: 0.85rem 1.2rem;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    [data-theme="dark"] .form-control {
      border-color: #2d2d44;
    }

    .form-control:focus {
      border-color: var(--success);
      box-shadow: 0 0 0 0.3rem rgba(40, 167, 69, 0.25);
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .form-control::placeholder {
      color: var(--text-secondary);
    }

    .btn-login {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      border: none;
      padding: 0.9rem 1.5rem;
      font-weight: 700;
      border-radius: 0.6rem;
      transition: all 0.3s ease;
      color: white;
      font-size: 1rem;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(40, 167, 69, 0.3);
      color: white;
    }

    .btn-login:active {
      transform: translateY(-1px);
    }

    .login-error {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 1rem;
      padding: 0.75rem;
      background: rgba(220, 53, 69, 0.1);
      border-left: 3px solid #dc3545;
      border-radius: 0.4rem;
      display: none;
    }

    .login-error.show {
      display: block;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .login-loading {
      display: none;
      text-align: center;
      margin-top: 1rem;
    }

    .login-loading .spinner-border {
      width: 2rem;
      height: 2rem;
      color: var(--success);
    }

    .login-demo {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #e0e6ed;
    }

    [data-theme="dark"] .login-demo {
      border-top-color: #2d2d44;
    }

    .login-demo p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }

    .login-demo code {
      background: var(--bg-secondary);
      color: var(--success);
      padding: 0.25rem 0.5rem;
      border-radius: 0.3rem;
      font-size: 0.8rem;
    }

    .theme-toggle-login {
      position: absolute;
      top: 2rem;
      right: 2rem;
      width: 50px;
      height: 26px;
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      padding: 0 2px;
    }

    .theme-toggle-login:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .theme-toggle-login .toggle-circle {
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      position: absolute;
      left: 2px;
      transition: left 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .theme-toggle-login.dark .toggle-circle {
      left: 26px;
    }

    @media (max-width: 576px) {
      .login-container {
        margin: 1rem;
        padding: 2rem 1.5rem;
        border-radius: 1rem;
      }

      .login-header h1 {
        font-size: 2rem;
      }

      .theme-toggle-login {
        top: 1rem;
        right: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="theme-toggle-login" id="themeToggleLogin" title="Alternar modo noturno">
    <div class="toggle-circle">
      <i class="fas fa-sun" style="color: #ffc107;"></i>
    </div>
  </div>

  <div class="login-wrapper">
    <div class="login-container">
      <div class="login-header">
        <h1><i class="fas fa-leaf"></i>NutriFit</h1>
        <p>Painel do Nutricionista</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label"><i class="fas fa-envelope me-2"></i>Email</label>
          <input type="email" name="email" class="form-control" placeholder="nutricionista@nutrifit.com.br" required>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock me-2"></i>Senha</label>
          <input type="password" name="password" class="form-control" placeholder="Sua senha" required>
        </div>

        <div class="login-error" id="loginError"></div>

        <div class="login-loading" id="loginLoading">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Entrando...</span>
          </div>
        </div>

        <button type="submit" class="btn btn-login w-100">
          <i class="fas fa-sign-in-alt me-2"></i>Entrar
        </button>
      </form>

      <div class="login-demo">
        <p><strong>✨ Credenciais de Teste:</strong></p>
        <small>
          Email: <code>nutricionista@nutrifit.com.br</code><br>
          Senha: <code>senha123</code>
        </small>
      </div>
    </div>
  </div>

  <script>
    function initLoginTheme() {
      const savedTheme = localStorage.getItem('nutrifit_theme') || 'light';
      setLoginTheme(savedTheme);
    }

    function setLoginTheme(theme) {
      const html = document.documentElement;
      const toggle = document.getElementById('themeToggleLogin');
      if (theme === 'dark') {
        html.setAttribute('data-theme', 'dark');
        toggle.classList.add('dark');
        toggle.querySelector('.toggle-circle i').className = 'fas fa-moon';
      } else {
        html.removeAttribute('data-theme');
        toggle.classList.remove('dark');
        toggle.querySelector('.toggle-circle i').className = 'fas fa-sun';
      }
      localStorage.setItem('nutrifit_theme', theme);
    }

    document.getElementById('themeToggleLogin')?.addEventListener('click', function() {
      const currentTheme = localStorage.getItem('nutrifit_theme') || 'light';
      const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
      setLoginTheme(nextTheme);
    });

    document.addEventListener('DOMContentLoaded', function() {
      initLoginTheme();
    });
  </script>
</body>
</html>
